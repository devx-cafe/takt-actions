name: "PR to Ready"
description: "Resolve PR context, create a synthetic ready commit parented on origin/main, and push to ready/<head-branch>"

inputs:
  user_name:
    description: "Git user name for operations"
    required: false
    type: string
    default: "Ready Pusher Bot"
  user_email:
    description: "Git user email for operations"
    required: false
    type: string
    default: "ready-pusher@${{ github.repository_owner }}.github.com"

runs:
  using: "composite"
  steps:
    - name: Deliver PR to ready branch
      id: pr_to_ready
      env:
        INPUT_USER_NAME: ${{ inputs.user_name }}
        INPUT_USER_EMAIL: ${{ inputs.user_email }}
      shell: bash
      run: ${{ github.action_path }}/pr_to_ready.ah
