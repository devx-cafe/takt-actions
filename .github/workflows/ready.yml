name: Ready
# This workflow is triggered by 'ready' branches

on:
  workflow_dispatch:
  push:
    branches:
      - "ready/**"

jobs:
  merge-to-trunk:
    name: Merge to trunk
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      pull-requests: write
      issues: write
      contents: write
      statuses: write

    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch full history to ensure we can merge and push
          token: ${{ secrets.READY_PUSHER }} # PAT with content:write

      - name: Mark pending
        run: ./.scripts/trunk-worthy  mark-pending

      - name: Set up runner environment
        uses: ./.github/actions/prep-runner 

      - name: test trunk worthy
        run: ./.scripts/trunk-worthy        

      - uses: devx-cafe/ready-to-trunk@experimental
        with:
          token: ${{ secrets.READY_PUSHER }} #required, must have the right permissions, and same as the token used in checkout step
          # target_branch: main #default is main
          # user_name: Ready Pusher Bot #default is "Ready Pusher Bot"
          # user_email: ready-pusher@${{ github.repository_owner }}.github.com #default is "ready-pusher@${{ github.repository_owner }}.github.com"
          delete_dev_branch: false # default is true
          delete_ready_branch: false # default is true
          close_pr: false # default is true
          close_issue: false # default is true

